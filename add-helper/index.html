<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollinations HTML Cleaner</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
textarea { width: 100%; margin: 8px 0; padding: 8px; font-family: monospace; font-size: 14px; }
button { padding: 10px 16px; font-size: 16px; cursor: pointer; }
#result { margin-top: 20px; white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; font-family: monospace; background: #f8f8f8; }
</style>
</head>
<body>

<h2>HTML Opschoner (Pollinations Chat)</h2>

<label>Jouw HTML-code:</label>
<textarea id="htmlInput" rows="10" placeholder="Plak hier je HTML-code…"></textarea>

<button id="sendBtn">Opschonen via AI</button>

<h3>Schone HTML:</h3>
<div id="result">— hier verschijnt de schone code —</div>

<script>
const sendBtn = document.getElementById("sendBtn");
const resultEl = document.getElementById("result");

const apiKey = "pk_ZK5SzUve4gOT33Ns";
const promptURL = "https://hyperrushnet.github.io/c6xc/add-helper/prompt.txt";

sendBtn.onclick = async () => {
  const htmlInput = document.getElementById("htmlInput").value.trim();
  if (!htmlInput) { alert("Plak eerst je HTML-code!"); return; }

  resultEl.textContent = "⏳ Prompt ophalen…";

  try {
    // fetch system prompt van GitHub
    const promptResp = await fetch(promptURL);
    if (!promptResp.ok) throw new Error("Kon system prompt niet ophalen: " + promptResp.status);
    const systemPrompt = await promptResp.text();

    resultEl.textContent = "⏳ AI genereert…";

    // POST naar Pollinations /v1/chat/completions
    const response = await fetch("https://gen.pollinations.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "gemini-fast",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: htmlInput }
        ]
      })
    });

    if (!response.ok) throw new Error("AI request failed: " + response.status);
    const data = await response.json();
    resultEl.textContent = data.choices?.[0]?.message?.content || "Geen response ontvangen.";

  } catch (err) {
    resultEl.textContent = "❌ Fout: " + err.message;
    console.error(err);
  }
};
</script>

</body>
</html>
