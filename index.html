<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #080808;
      --surface: #111;
      --border: #222;
      --text-muted: #555;
      --text-main: #ccc;
      --accent: #00ff88;
      --font: 'JetBrains Mono', 'ui-monospace', monospace;
    }

    * { scrollbar-width: thin; scrollbar-color: #222 var(--bg); }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-thumb { background: #222; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px; /* Tekst groter gemaakt */
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search-input {
      flex: 1;
      background: #000;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      border-radius: 2px;
    }

    .action-bar {
      padding: 6px 20px;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 11px; /* Stats iets kleiner dan de hoofdtekst */
      letter-spacing: 0.5px;
    }

    .stat b { color: var(--accent); font-weight: normal; }

    main { flex: 1; display: flex; overflow: hidden; }
    
    .table-container { flex: 1; overflow-y: auto; background: #050505; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { 
      position: sticky; top: 0; background: var(--surface); 
      text-align: left; padding: 10px 20px; border-bottom: 1px solid var(--border);
      color: #333; font-size: 10px; text-transform: uppercase; z-index: 10;
    }
    td { padding: 8px 20px; border-bottom: 1px solid #0f0f0f; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    tr { cursor: pointer; }
    tr:hover { background: rgba(0, 255, 136, 0.03); }
    tr.is-pinned { border-left: 3px solid var(--accent); background: rgba(0, 255, 136, 0.01); }
    tr.is-pinned td:first-child { color: var(--accent); font-weight: bold; }
    
    .game-link { color: var(--text-main); text-decoration: none; display: block; }
    .game-link:hover { color: var(--accent); text-decoration: underline; }

    .sidebar { width: 350px; border-left: 1px solid var(--border); background: #080808; display: flex; flex-direction: column; }
    #json-preview { flex: 1; width: 100%; background: #030303; color: #006633; border: none; padding: 15px; font-size: 11px; resize: none; outline: none; line-height: 1.4; }

    .btn-icon {
      background: transparent;
      color: #444;
      border: 1px solid transparent;
      padding: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: color 0.1s;
    }
    .btn-icon:hover, .btn-icon.active { color: var(--accent); }
    .btn-icon i { width: 10px; height: 10px; } /* Iconen blijven klein */

    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--surface); border: 1px solid var(--border); padding: 20px; width: 300px; }

    @media (max-width: 1000px) { .sidebar { display: none; } }
  </style>
</head>
<body>

<header>
  <input type="text" id="search-filter" class="search-input" placeholder="filter_resources..." autocomplete="off">
  <button class="btn-icon" id="toggle-favorites" onclick="toggleFavoriteView()"><i data-lucide="star"></i></button>
  <button class="btn-icon" onclick="toggleConfig()"><i data-lucide="settings"></i></button>
</header>

<div class="action-bar">
  <div class="stat">FILES: <b id="stat-count">0</b></div>
  <div class="stat">SIZE: <b id="stat-size">0 KB</b></div>
  <div class="stat">RATE: <b id="stat-rate">--</b></div>
  <div style="flex: 1"></div>
  <button class="btn-icon" onclick="downloadData()"><i data-lucide="download"></i></button>
  <button class="btn-icon" onclick="copyRawData()"><i data-lucide="copy"></i></button>
</div>

<main>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Resource</th>
          <th style="width: 100px;">Size</th>
          <th style="width: 30%;">Path</th>
        </tr>
      </thead>
      <tbody id="game-list"></tbody>
    </table>
  </div>
  <aside class="sidebar">
    <textarea id="json-preview" readonly spellcheck="false"></textarea>
  </aside>
</main>

<div id="overlay">
  <div class="modal">
    <input type="password" id="auth-token" class="search-input" style="width: 100%; margin-bottom: 15px;" placeholder="token">
    <div style="display: flex; gap: 10px;">
      <button class="button btn-icon" style="flex: 1; border: 1px solid #222; padding: 8px;" onclick="saveConfiguration()">SAVE</button>
      <button class="button btn-icon" style="flex: 1; border: 1px solid #222; padding: 8px;" onclick="toggleConfig()">CLOSE</button>
    </div>
  </div>
</div>

<script>
  let allGames = [];
  let filterOnlyPinned = false;
  const el = (id) => document.getElementById(id);

  function formatDisplayName(fileName) {
    const raw = fileName.replace('.html', '');
    if (raw === '1v1-lol') return '1v1.lol';
    return raw.replace(/-/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + wordSlice(w)).join(' ');
  }
  
  function wordSlice(w) { return w.slice(1).toLowerCase(); }

  function getPinned() { return JSON.parse(localStorage.getItem('c6_p') || '[]'); }

  function handleRowClick(e, path) {
    if (e.target.closest('a')) return;
    let p = getPinned();
    p = p.includes(path) ? p.filter(x => x !== path) : [...p, path];
    localStorage.setItem('c6_p', JSON.stringify(p));
    applyFilters();
  }

  function toggleFavoriteView() {
    filterOnlyPinned = !filterOnlyPinned;
    el('toggle-favorites').classList.toggle('active', filterOnlyPinned);
    applyFilters();
  }

  async function fetchCollection() {
    const host = window.location.hostname;
    let u = "HyperRushNet", r = "c6xc";
    if (host.endsWith(".github.io")) {
      u = host.split(".")[0];
      r = window.location.pathname.split("/").filter(x => x).shift() || host;
    }
    const t = localStorage.getItem('c6_t');
    const h = { 'Accept': 'application/vnd.github.v3+json' };
    if (t) h['Authorization'] = `token ${t}`;

    try {
      const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/`, { headers: h });
      const data = await res.json();
      el('stat-rate').textContent = res.headers.get('X-RateLimit-Remaining');
      allGames = data.filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html')
        .map(f => ({ name: formatDisplayName(f.name), path: f.name, size: f.size }))
        .sort((a,b) => a.name.localeCompare(b.name));
      applyFilters();
    } catch (e) { console.error(e); }
  }

  function applyFilters() {
    const q = el('search-filter').value.toLowerCase();
    const p = getPinned();
    const f = allGames.filter(g => (g.name.toLowerCase().includes(q) || g.path.toLowerCase().includes(q)) && (filterOnlyPinned ? p.includes(g.path) : true));
    renderTable(f);
  }

  function renderTable(data) {
    const p = getPinned();
    el('game-list').innerHTML = data.map(g => `
      <tr class="${p.includes(g.path) ? 'is-pinned' : ''}" onclick="handleRowClick(event, '${g.path}')">
        <td><a href="./${g.path}" class="game-link" target="_blank">${g.name}</a></td>
        <td style="color: #444;">${(g.size / 1024).toFixed(1)} KB</td>
        <td style="color: #1a1a1a; font-size: 11px;">${g.path}</td>
      </tr>
    `).join('');
    el('stat-count').textContent = data.length;
    el('stat-size').textContent = (data.reduce((a, b) => a + b.size, 0) / 1024).toFixed(0) + ' KB';
    el('json-preview').value = JSON.stringify(data, null, 2);
    lucide.createIcons();
  }

  function copyRawData() { el('json-preview').select(); document.execCommand('copy'); }
  function downloadData() {
    const blob = new Blob([el('json-preview').value], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'data.json'; a.click();
  }
  function toggleConfig() { el('overlay').style.display = el('overlay').style.display === 'flex' ? 'none' : 'flex'; }
  function saveConfiguration() { localStorage.setItem('c6_t', el('auth-token').value.trim()); toggleConfig(); fetchCollection(); }
  
  el('search-filter').oninput = applyFilters;
  window.onkeydown = (e) => { if (e.key === '/') { e.preventDefault(); el('search-filter').focus(); } };
  
  fetchCollection();
</script>
</body>
</html>
