<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C6XC Collection</title>
  <style>
    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --border: #333;
      --text: #ddd;
      --accent: #4caf50;
      --font: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Monaco, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 10px 15px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .brand { font-weight: bold; color: #fff; }
    .search-box {
      flex: 1;
      min-width: 150px;
      background: #000;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 8px 10px;
      font-family: inherit;
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .stats { white-space: nowrap; color: #888; font-size: 11px; }
    
    main { flex: 1; overflow-y: auto; background: #0c0c0c; display: flex; flex-direction: column; }
    .table-container { flex: 1; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { 
      position: sticky; top: 0; background: var(--surface); 
      text-align: left; padding: 10px 15px; border-bottom: 1px solid var(--border);
      color: #888; text-transform: uppercase; font-size: 10px; letter-spacing: 1px;
      z-index: 10;
    }
    td { padding: 8px 15px; border-bottom: 1px solid #181818; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover { background: #1a1a1a; }
    
    a { color: var(--text); text-decoration: none; display: block; }
    tr:hover a { color: var(--accent); }
    
    .btn {
      background: #222; color: #ccc; border: 1px solid var(--border);
      padding: 6px 10px; cursor: pointer; font-size: 11px; text-transform: uppercase;
    }
    .btn:hover { background: #333; color: #fff; }

    /* JSON Section */
    .json-section {
      height: 200px;
      background: #050505;
      border-top: 2px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .json-header {
      background: #111;
      padding: 5px 15px;
      font-size: 10px;
      color: #666;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #json-output {
      flex: 1;
      width: 100%;
      background: transparent;
      color: #888;
      border: none;
      padding: 10px;
      font-family: var(--font);
      font-size: 11px;
      resize: none;
      outline: none;
    }

    @media (max-width: 600px) {
      .col-file { display: none; }
      th:nth-child(3), td:nth-child(3) { display: none; }
      header { gap: 8px; }
      .stats { order: 3; width: 100%; text-align: center; border-top: 1px solid #222; padding-top: 5px; }
      .json-section { height: 150px; }
    }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal { background: var(--surface); border: 1px solid var(--border); padding: 20px; width: 90%; max-width: 320px; }
  </style>
</head>
<body>

<header>
  <div class="brand">C6XC_COLL</div>
  <input type="text" id="filter" class="search-box" placeholder="Filter games..." spellcheck="false" autocomplete="off">
  <button class="btn" onclick="toggleCfg()">CFG</button>
  <div class="stats">
    <span id="count">0</span> ITEMS | <span id="rate">--/--</span>
  </div>
</header>

<main>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th style="width: 55px;">ID</th>
          <th>NAME</th>
          <th class="col-file" style="width: 35%;">FILE</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <div class="json-section">
    <div class="json-header">
      <span>GEN_DATA: RAW_JSON_ARRAY</span>
      <button class="btn" style="padding: 2px 6px; font-size: 9px;" onclick="copyJson()">Copy JSON</button>
    </div>
    <textarea id="json-output" readonly placeholder="Waiting for data..."></textarea>
  </div>
</main>

<div id="overlay">
  <div class="modal">
    <div style="margin-bottom: 10px; font-size: 11px;">GITHUB_TOKEN:</div>
    <input type="password" id="token" class="search-box" style="width: 100%; margin-bottom: 15px;">
    <div style="display: flex; gap: 10px;">
      <button class="btn" style="flex: 1;" onclick="saveCfg()">SAVE</button>
      <button class="btn" style="flex: 1;" onclick="toggleCfg()">ABORT</button>
    </div>
  </div>
</div>

<script>
  let games = [];
  const el = (id) => document.getElementById(id);

  function formatName(str) {
    return str.replace(/-/g, ' ')
              .split(' ')
              .map(w => w.charAt(0).toUpperCase() + w.slice(1))
              .join(' ');
  }

  function getRepo() {
    const h = window.location.hostname;
    if (h.endsWith(".github.io")) {
      const u = h.split(".")[0];
      const p = window.location.pathname.split("/").filter(x => x).shift();
      return { u, r: p || h };
    }
    return { u: "HyperRushNet", r: "c6xc" };
  }

  async function load() {
    const { u, r } = getRepo();
    const token = localStorage.getItem('c6xc_auth');
    const h = { 'Accept': 'application/vnd.github.v3+json' };
    if (token) h['Authorization'] = `token ${token}`;

    try {
      const res = await fetch(`https://api.github.com/repos/${u}/${r}/contents/`, { headers: h });
      if (!res.ok) throw res.status;

      el('rate').textContent = `${res.headers.get('X-RateLimit-Remaining')}/${res.headers.get('X-RateLimit-Limit')}`;
      
      const data = await res.json();
      games = data
        .filter(f => f.type === 'file' && f.name.endsWith('.html') && f.name !== 'index.html')
        .map((f, i) => ({ 
          name: formatName(f.name.replace('.html', '')), 
          path: f.name,
          size: f.size
        }))
        .sort((a, b) => a.name.localeCompare(b.name));
      
      render(games);
    } catch (e) {
      el('list').innerHTML = `<tr><td colspan="3" style="color:#ff4444; padding: 20px;">ERR_FETCH: ${e}</td></tr>`;
    }
  }

  function render(list) {
    el('list').innerHTML = list.map((g, i) => `
      <tr>
        <td style="color: #555;">${(i + 1).toString().padStart(3, '0')}</td>
        <td><a href="./${g.path}">${g.name}</a></td>
        <td class="col-file" style="color: #555;">${g.path}</td>
      </tr>
    `).join('');
    el('count').textContent = list.length;
    
    // Update JSON output
    el('json-output').value = JSON.stringify(list, null, 2);
  }

  el('filter').oninput = (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = games.filter(g => g.name.toLowerCase().includes(q) || g.path.toLowerCase().includes(q));
    render(filtered);
  };

  function copyJson() {
    const area = el('json-output');
    area.select();
    document.execCommand('copy');
    alert('JSON copied to clipboard');
  }

  window.onkeydown = (e) => { if (e.key === '/') { e.preventDefault(); el('filter').focus(); } };
  
  function toggleCfg() { 
    const v = el('overlay');
    v.style.display = v.style.display === 'flex' ? 'none' : 'flex';
    if (v.style.display === 'flex') el('token').value = localStorage.getItem('c6xc_auth') || '';
  }
  
  function saveCfg() { 
    localStorage.setItem('c6xc_auth', el('token').value.trim()); 
    toggleCfg(); 
    load(); 
  }

  load();
</script>
</body>
</html>
