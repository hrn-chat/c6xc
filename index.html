<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C6X6 - Files</title>
</head>
<body>
<ul id="game-list"></ul>

<script>
const repoAPI = "https://api.github.com/repos/HyperRushNet/c6xc/contents/";

fetch(repoAPI)
  .then(response => response.json())
  .then(data => {
    const list = document.getElementById("game-list");
    data.forEach(file => {
      if(file.name.endsWith(".html")) { 
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = file.download_url; 
        a.textContent = file.name;
        a.target = "_blank";
        li.appendChild(a);
        list.appendChild(li);
      }
    });
  })
  .catch(err => {
    console.error("Error:", err);
  });
</script>
</body>
</html>
